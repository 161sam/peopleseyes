# PeoplesEyes GUN-Relay – Nginx Konfiguration
# Ersetze YOUR_DOMAIN durch deine Domain (z.B. relay.peopleseyes.org)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  # ─── Logging ──────────────────────────────────────────────────────────────
  # Kein Zugriffslog – Privacy-by-Design
  access_log off;

  # ─── Grundlegende Sicherheits-Header ──────────────────────────────────────
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;

  # ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────
  server {
    listen 80;
    server_name YOUR_DOMAIN;

    # ACME-Challenge für Let's Encrypt certbot
    location /.well-known/acme-challenge/ {
      root /var/www/html;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS + WebSocket Proxy ───────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # TLS-Zertifikate (Let's Encrypt via certbot)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Moderne TLS-Konfiguration (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS – 6 Monate
    add_header Strict-Transport-Security "max-age=15768000" always;

    # ─── GUN WebSocket + HTTP Proxy ─────────────────────────────────────────
    location /gun {
      proxy_pass         http://gun-relay:8765;
      proxy_http_version 1.1;

      # WebSocket-Upgrade
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;

      # Echte Client-IP nicht weiterleiten – Privacy
      proxy_set_header   X-Real-IP "";
      proxy_set_header   X-Forwarded-For "";
      proxy_set_header   X-Forwarded-Proto "";

      # Timeouts für lange WebSocket-Verbindungen
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;

      # CORS – GUN-Clients aus verschiedenen Origins zulassen
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "GET, PUT, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type" always;

      if ($request_method = OPTIONS) {
        return 204;
      }
    }

    # Health-Check Endpoint (für Monitoring ohne Logs)
    location /health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # Alles andere ablehnen
    location / {
      return 404;
    }
  }
}
