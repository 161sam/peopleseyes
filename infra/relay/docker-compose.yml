services:

  # ─── GUN.js Relay-Server ────────────────────────────────────────────────────
  gun-relay:
    image: node:20-alpine
    working_dir: /app
    # GUN hat keinen offiziellen Docker-Image – wir starten es direkt mit npx
    command: >
      sh -c "npm install gun@0.2020.1240 --no-save && node -e \"
        const Gun = require('gun');
        const http = require('http');
        const server = http.createServer(Gun.serve(__dirname));
        server.listen(8765, () => console.log('GUN relay listening on :8765'));
        new Gun({ web: server, radisk: false, localStorage: false });
      \""
    expose:
      - "8765"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8765/gun"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.peopleseyes.service=gun-relay"
    # Kein Port-Mapping nach außen – Nginx terminiert TLS und proxied
    networks:
      - relay-internal

  # ─── Nginx TLS-Termination ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      # TLS-Zertifikate – mit certbot/Let's Encrypt befüllen
      - ./certs:/etc/nginx/certs:ro
      # ACME-Challenge für certbot
      - ./webroot:/var/www/html:ro
    depends_on:
      gun-relay:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - relay-internal

networks:
  relay-internal:
    driver: bridge
