<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Zivilgesellschaftliches Crowdsourcing-Tool zur Dokumentation von Behördenaktivitäten in EU/D" />
    <!--
      Content Security Policy – SEC-01 fix
      Erlaubt nur bekannte, notwendige Verbindungen:
      - GUN-Bootstrap-Relays (HTTPS + WSS)
      - OpenFreeMap-Kacheln (kein API-Key, kein Tracking)
      Alle anderen Verbindungen werden vom Browser blockiert.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: https://tiles.openfreemap.org;
      connect-src 'self'
        https://gun-manhattan.herokuapp.com
        wss://gun-manhattan.herokuapp.com
        https://peer.wallie.io
        wss://peer.wallie.io
        https://tiles.openfreemap.org;
      worker-src 'self' blob:;
      manifest-src 'self';
      frame-ancestors 'none';
    " />
    <!-- Kein externes Tracking, kein Analytics -->
    <title>PeoplesEyes</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
